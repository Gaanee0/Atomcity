---
# yaml-language-server: $schema=https://schema.blue-build.org/module-v1.json

modules:
  - type: dnf
    remove:
      auto-remove: false
      packages:
        - libfprint

  - type: dnf
    install:
      install-weak-deps: false
      packages:
        # Niri
        - niri
        - xwayland-satellite
        - swaybg
        - xdg-desktop-portal-gnome

        # DMS and desktop aesthetics
        - dms
        - dms-cli
        - danksearch
        - dgop
        - dsearch
        - dms-greeter
        - quickshell-git
        - matugen
        - material-symbols-fonts
        - darkly
        - khal
        - greetd
        - cava
        - gammastep
        - qt6ct
        - qt5ct
        - adw-gtk3-theme
        - nwg-look
        - papirus-icon-theme

        # Fonts
        - rsms-inter-fonts
        - qgnomeplatform-qt5
        - qgnomeplatform-qt6
        - fontawesome-fonts-all
        - jetbrains-mono-fonts
        - wine-ms-sans-serif-fonts

        # Hardware enablement
        - asusctl
        - dislocker
        - ntfs2btrfs
        - adb-enhanced
        - cups-pk-helper
 
        # Fingerprint
        - libfprint-elanmoc2
        - fprintd
        - fprintd-pam

        # Utilities
        - ghostty

